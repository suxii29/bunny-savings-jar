<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunny Savings Jar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header class="header">
    <h1>🐰 Bunny Savings Jar</h1>
    <p class="subtitle">
      Save little by little and watch your jar fill up.
    </p>
  </header>

  <section class="savings-card">

    <p class="label">Total Saved</p>

    <h2 id="total">0 SAR</h2>

    <div class="jar-container">

      <div class="jar">

        <div class="fill" id="fill"></div>

      </div>

    </div>

    <button id="addBtn">
      Add Deposit
    </button>

  </section>

  <section class="history">

    <h3>Recent Deposits</h3>

    <div id="historyList">
      No deposits yet.
    </div>

  </section>

</div>

<script src="script.js"></script>

</body>
</html>
